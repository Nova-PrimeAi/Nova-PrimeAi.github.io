<!DOCTYPE html>
<html>
<head>
<title>Nova-Prime AI</title>

<style>
body{
  background:black;
  color:#00ff9c;
  font-family:monospace;
  margin:0;
  padding:20px;
}

#boot{
  white-space:pre-line;
}

#mainUI{
  display:none;
}

button{
  background:#00ff9c;
  border:none;
  padding:10px;
  margin-top:10px;
  front-size:28px;
}
</style>
</head>

<body>

<div id="boot"></div>

<div id="mainUI">
  <h1>Nova-Prime AI</h1>
  <p>System Ready.</p>
  <input placeholder="Type your command..." style="padding:8px;width:300px;">
  <br>
  <button>Send</button>
</div>

<script>

const lines = [
"Initializing Nova-Core...",
"Loading neural modules...",
"Connecting to AI network...",
"Calibrating voice systems...",
"Synchronizing data streams...",
"Boot sequence complete.",
"Launching Nova interface..."
];

let i = 0;
const boot = document.getElementById("boot");

function bootSequence(){
  if(i < lines.length){
    boot.innerHTML += lines[i] + "<br>";
    i++;
    setTimeout(bootSequence,700);
  }else{
    startUI();
  }
}

function startUI(){
  document.getElementById("boot").style.display="none";
  document.getElementById("mainUI").style.display="block";
}

window.onload = bootSequence;

</script>

</body>
</html>
