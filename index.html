<!DOCTYPE html>
<html>
<head>
<title>Nova AI</title>

<style>
body{
  background:black;
  color:#00ff9c;
  font-family:monospace;
  padding:20px;
}

#terminal{
  white-space:pre-line;
  font-size:18px;
}
</style>
</head>

<body>

<h1>Nova-Prime AI</h1>
<div id="terminal"></div>

<script>
const lines = [
"Initializing Nova-Core...",
"Loading neural modules...",
"Connecting to AI network...",
"Calibrating voice systems...",
"Synchronizing data streams...",
"Boot sequence complete.",
"",
"Nova-Prime is now ONLINE.",
"Awaiting your command..."
];

let i = 0;

function typeLine(){
  if(i < lines.length){
    document.getElementById("terminal").innerHTML += lines[i] + "\n";
    i++;
    setTimeout(typeLine, 800);
  }
}

typeLine();
</script>

</body>
</html>
