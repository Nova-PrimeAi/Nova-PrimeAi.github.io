<!DOCTYPE html>
<html>
<head>
<title>Nova-Prime AI</title>

<style>

body{
background:#0a0a0a;
color:#00ffc8;
font-family:monospace;
margin:0;
padding:0;
}

/* Boot screen */
#boot{
padding:40px;
font-size:32px;
line-height:1.6;
}

/* Chat UI */
#chatUI{
display:none;
height:100vh;
display:flex;
flex-direction:column;
}

#header{
background:#111;
padding:20px;
font-size:28px;
border-bottom:2px solid #00ffc8;
}

#chatbox{
flex:1;
padding:20px;
overflow-y:auto;
font-size:20px;
}

.message{
margin-bottom:15px;
}

.user{
color:#ffffff;
}

.nova{
color:#00ffc8;
}

#inputArea{
display:flex;
border-top:2px solid #00ffc8;
}

#msg{
flex:1;
padding:15px;
font-size:18px;
background:#0a0a0a;
color:white;
border:none;
outline:none;
}

button{
width:120px;
background:#00ffc8;
border:none;
font-size:18px;
cursor:pointer;
}

</style>
</head>

<body>

<div id="boot"></div>

<div id="chatUI">

<div id="header">Nova-Prime AI</div>

<div id="chatbox"></div>

<div id="inputArea">
<input id="msg" placeholder="Message Nova...">
<button onclick="sendMsg()">Send</button>
</div>

</div>

<script>

const lines=[
"Initializing Nova-Core...",
"Loading neural modules...",
"Connecting to AI network...",
"Calibrating systems...",
"Boot sequence complete.",
"Launching Nova interface..."
];

let i=0;
const boot=document.getElementById("boot");

function bootSeq(){

if(i<lines.length){

boot.innerHTML+=lines[i]+"<br>";
i++;
setTimeout(bootSeq,700);

}else{

startUI();

}

}

function startUI(){

document.getElementById("boot").style.display="none";
document.getElementById("chatUI").style.display="flex";

addMessage("nova","Hello. I am Nova-Prime. How can I assist you?");

}

function addMessage(sender,text){

const chat=document.getElementById("chatbox");

const div=document.createElement("div");

div.className="message "+sender;

div.innerText=(sender==="user"?"You: ":"Nova: ")+text;

chat.appendChild(div);

chat.scrollTop=chat.scrollHeight;

}

function sendMsg(){

const input=document.getElementById("msg");

if(input.value.trim()==="") return;

addMessage("user",input.value);

setTimeout(()=>{

addMessage("nova","Processing: "+input.value);

},600);

input.value="";

}

window.onload=bootSeq;

</script>

</body>
</html>
