<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot UI Clone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #000000; color: #ffffff; font-family: ui-sans-serif, system-ui, sans-serif; }
        .sidebar-bg { background-color: #000000; border-right: 1px solid #2d2d2d; }
        .input-bg { background-color: #1a1a1a; border: 1px solid #333333; }
        .text-muted { color: #8e8e8e; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <div class="w-12 flex flex-col items-center py-4 gap-6 sidebar-bg border-r border-gray-800">
        <i class="fa-regular fa-comment-dots text-xl text-gray-400"></i>
        <i class="fa-solid fa-sliders text-xl text-gray-400"></i>
        <i class="fa-solid fa-pencil text-xl text-gray-400"></i>
        <i class="fa-regular fa-file-lines text-xl text-gray-400"></i>
        <i class="fa-solid fa-book text-xl text-gray-400"></i>
        <i class="fa-regular fa-face-smile text-xl text-gray-400"></i>
    </div>

    <div class="w-64 sidebar-bg flex flex-col p-4">
        <div class="relative mb-4">
            <button class="w-full text-left bg-transparent border border-gray-700 rounded-md p-2 text-sm flex justify-between items-center">
                Select workspace...
                <i class="fa-solid fa-chevron-up text-[10px]"></i>
            </button>
        </div>

        <div class="flex gap-2 mb-4">
            <button class="flex-1 bg-white text-black font-medium py-2 rounded-md text-sm flex items-center justify-center gap-2">
                <i class="fa-solid fa-plus"></i> New Chat
            </button>
            <button class="px-3 border border-gray-700 rounded-md">
                <i class="fa-solid fa-folder-plus text-gray-400"></i>
            </button>
        </div>

        <div class="relative mb-8">
            <input type="text" placeholder="Search chats..." class="w-full bg-[#111] border border-gray-800 rounded-md p-2 text-xs outline-none">
        </div>

        <div class="flex-1 flex items-center justify-center italic text-gray-500 text-sm">
            No chats.
        </div>
    </div>

    <main class="flex-1 flex flex-col relative bg-[#0d0d0d]">
        
        <header class="flex justify-between items-center px-6 py-4">
            <div class="flex items-center gap-1 cursor-pointer">
                <span class="text-sm font-semibold">Quick Settings</span>
                <i class="fa-solid fa-chevron-down text-[10px]"></i>
            </div>
            <div class="flex items-center gap-2">
                <span class="text-sm font-medium">GPT-4 Turbo</span>
                <i class="fa-solid fa-sliders text-sm"></i>
            </div>
        </header>

        <div class="flex-1 flex flex-col items-center justify-center -mt-20">
            <div class="bg-white text-black w-12 h-12 rounded-xl flex items-center justify-center mb-4">
                <span class="font-bold text-xl">UI</span>
            </div>
            <h1 class="text-4xl font-bold tracking-tight">Chatbot UI</h1>
        </div>

        <div class="p-6 pb-10 flex justify-center">
            <div class="w-full max-w-3xl relative">
                <div class="input-bg rounded-xl flex items-center p-3">
                    <button class="text-gray-400 hover:text-white px-2">
                        <i class="fa-solid fa-circle-plus text-xl"></i>
                    </button>
                    <input type="text" placeholder="Send a message..." class="bg-transparent flex-1 outline-none text-sm px-2">
                    <button class="text-gray-600 px-2">
                        <i class="fa-solid fa-paper-plane text-lg"></i>
                    </button>
                </div>
            </div>
        </div>

        <div class="absolute bottom-6 right-6">
            <div class="w-8 h-8 rounded-full bg-gray-600 flex items-center justify-center cursor-pointer hover:bg-gray-500">
                <i class="fa-solid fa-question text-xs"></i>
            </div>
        </div>
    </main>

</body>
</html>
